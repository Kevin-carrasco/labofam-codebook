  author: "Equipo LABOFAM"
  date: 01/03/2026
  reader-mode: true
  page-footer:
    left: |
      Núcleo Milenio en Política Laboral y Vida Familiar y Colectiva (LABOFAM).

    right: |
      Este libro se construyó con <a href="https://quarto.org/">Quarto</a>.
  page-navigation: true
  cover-image: labofam.svg
  favicon: labofam.svg
  repo-url: https://github.com/kevin-carrasco/labofam-codebook
  repo-branch: main
  chapters:
    - index.qmd
    - 01-antecedents.qmd
    - 02-database.qmd
    - 03-codebook.qmd
#    - 04-results.qmd
  search:
